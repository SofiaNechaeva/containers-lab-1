apiVersion: v1
kind: Pod
metadata:
  name: app-pod
  labels:
    app: goapp
    lab: lab2
spec:
  containers:
    - name: app
      image: ghcr.io/sofianechaeva/containers-lab-1/app:sha-728dd83
      ports:
        - containerPort: 8080
      resources:
        requests:
          memory: "64Mi"
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"
