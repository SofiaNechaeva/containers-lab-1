name: Validate Kubernetes Manifests

on:
  push:
    paths:
      - 'k8s/**/*.yaml'
      - '.github/workflows/k8s-validate.yml'
  pull_request:
    paths:
      - 'k8s/**/*.yaml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin/

      - name: Validate Kubernetes manifests with kubeval
        run: |
          kubeval --strict --ignore-missing-schemas k8s/*.yaml

      # - name: Install kubectl
      #   uses: azure/setup-kubectl@v3
      #   with:
      #     version: 'v1.28.0'

      # - name: Dry-run apply
      #   run: |
      #     for file in k8s/*.yaml; do
      #       echo "Validating $file"
      #       kubectl create --dry-run=client --validate=false -f "$file"

      #     done
      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests with kubeconform
        run: |
          kubeconform -strict -ignore-missing-schemas -summary k8s/


      # - name: Check for deprecated APIs
      #   uses: yannh/kubernetes-json-schema@master
      #   with:
      #     kubernetes-version: 1.28.0
      #     manifests: k8s/

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: k8s/
          config_file: .yamllint.yml
